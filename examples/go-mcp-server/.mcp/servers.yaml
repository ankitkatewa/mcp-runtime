version: v1
servers:
  - name: go-example-mcp
    route: /go-example-mcp/mcp
    publicPathPrefix: go-example-mcp
    port: 8088
    namespace: mcp-servers
    envVars:
      - name: MCP_PATH
        value: /go-example-mcp/mcp
    tools:
      - name: aaa-ping
        requiredTrust: low
      - name: echo
        requiredTrust: low
      - name: add
        requiredTrust: low
      - name: upper
        requiredTrust: medium
      - name: lower
        requiredTrust: low
      - name: slugify
        requiredTrust: low
