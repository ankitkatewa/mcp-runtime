version: v1
servers:
  - name: rust-example-mcp
    route: /rust-example-mcp/mcp
    publicPathPrefix: rust-example-mcp
    port: 8088
    namespace: mcp-servers
    envVars:
      - name: MCP_PATH
        value: /rust-example-mcp/mcp
    tools:
      - name: repeat
        requiredTrust: low
      - name: word_count
        requiredTrust: low
