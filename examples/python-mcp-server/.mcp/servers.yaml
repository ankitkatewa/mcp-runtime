version: v1
servers:
  - name: python-example-mcp
    route: /python-example-mcp/mcp
    publicPathPrefix: python-example-mcp
    port: 8088
    namespace: mcp-servers
    envVars:
      - name: MCP_PATH
        value: /python-example-mcp/mcp
    tools:
      - name: echo
        requiredTrust: low
      - name: reverse
        requiredTrust: low
