---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: mcpservers.mcpruntime.org
spec:
  group: mcpruntime.org
  names:
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    singular: mcpserver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.policyReady
      name: Policy
      type: boolean
    - jsonPath: .status.gatewayReady
      name: Gateway
      type: boolean
    - jsonPath: .status.deploymentReady
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: MCPServer is the Schema for the mcpservers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MCPServerSpec defines the desired state of MCPServer.
            properties:
              analytics:
                description: |-
                  Analytics configures audit/analytics emission for the gateway sidecar.
                  Analytics is only applied when Gateway is enabled.
                properties:
                  apiKeySecretRef:
                    description: APIKeySecretRef points to a secret key containing
                      the analytics API key.
                    properties:
                      key:
                        type: string
                      name:
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  enabled:
                    description: Enabled turns on analytics emission from the gateway
                      sidecar.
                    type: boolean
                  eventType:
                    description: EventType is the event type label attached to emitted
                      analytics events.
                    type: string
                  ingestURL:
                    description: IngestURL is the analytics ingest endpoint.
                    type: string
                  source:
                    description: Source is the event source label attached to emitted
                      analytics events.
                    type: string
                type: object
              auth:
                description: Auth configures how the gateway extracts human, agent,
                  and session identity.
                properties:
                  agentIDHeader:
                    type: string
                  audience:
                    type: string
                  humanIDHeader:
                    type: string
                  issuerURL:
                    type: string
                  mode:
                    enum:
                    - none
                    - header
                    - oauth
                    type: string
                  sessionIDHeader:
                    type: string
                  tokenHeader:
                    type: string
                type: object
              envVars:
                description: EnvVars are literal environment variables to pass to
                  the container.
                items:
                  description: EnvVar represents a literal environment variable.
                  properties:
                    name:
                      type: string
                    value:
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              gateway:
                description: Gateway configures an optional MCP proxy sidecar in front
                  of the server container.
                properties:
                  enabled:
                    description: Enabled turns on the gateway sidecar for this server.
                    type: boolean
                  image:
                    description: Image overrides the proxy container image for this
                      server.
                    type: string
                  port:
                    description: Port is the port the gateway listens on inside the
                      pod (defaults to 8091).
                    format: int32
                    type: integer
                  stripPrefix:
                    description: StripPrefix removes a path prefix before forwarding
                      to the upstream server.
                    type: string
                  upstreamURL:
                    description: |-
                      UpstreamURL is the upstream URL the gateway proxies to.
                      Defaults to http://127.0.0.1:<spec.port>.
                    type: string
                type: object
              image:
                description: Image is the container image for the MCP server.
                type: string
              imagePullSecrets:
                description: ImagePullSecrets are secrets to use for pulling the image.
                items:
                  type: string
                type: array
              imageTag:
                description: ImageTag is the tag of the container image (defaults
                  to "latest").
                type: string
              ingressAnnotations:
                additionalProperties:
                  type: string
                description: IngressAnnotations are additional annotations for the
                  ingress controller.
                type: object
              ingressClass:
                description: IngressClass is the ingress class to use (e.g., "traefik",
                  "nginx", "istio"). Defaults to "traefik".
                type: string
              ingressHost:
                description: IngressHost is the hostname for the ingress (required
                  unless publicPathPrefix is set; defaults from MCP_DEFAULT_INGRESS_HOST
                  env var if set on the operator).
                type: string
              ingressPath:
                description: IngressPath is the path for the ingress route (defaults
                  to /{name}/mcp).
                type: string
              mcpResources:
                description: MCPResources describes the MCP resource inventory exposed
                  by the server.
                items:
                  description: InventoryItem describes a named MCP prompt, resource,
                    or task.
                  properties:
                    description:
                      type: string
                    labels:
                      additionalProperties:
                        type: string
                      type: object
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              policy:
                description: Policy configures gateway-side authorization behavior.
                properties:
                  defaultDecision:
                    enum:
                    - allow
                    - deny
                    type: string
                  enforceOn:
                    type: string
                  mode:
                    enum:
                    - allow-list
                    - observe
                    type: string
                  policyVersion:
                    type: string
                type: object
              port:
                description: Port is the port the container listens on (defaults to
                  8088).
                format: int32
                type: integer
              prompts:
                description: Prompts describes the MCP prompt inventory exposed by
                  the server.
                items:
                  description: InventoryItem describes a named MCP prompt, resource,
                    or task.
                  properties:
                    description:
                      type: string
                    labels:
                      additionalProperties:
                        type: string
                      type: object
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              publicPathPrefix:
                description: |-
                  PublicPathPrefix enables path-based public routing and is used to compute /<publicPathPrefix>/mcp.
                  When set, the operator prefers path-based ingress rules without a host match.
                type: string
              registryOverride:
                description: RegistryOverride, if set, overrides the registry portion
                  of the image (e.g., registry.mcpruntime.com).
                type: string
              replicas:
                description: Replicas is the number of desired replicas (defaults
                  to 1).
                format: int32
                type: integer
              resources:
                description: Resources defines resource limits and requests.
                properties:
                  limits:
                    description: ResourceList defines CPU and memory resources.
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                  requests:
                    description: ResourceList defines CPU and memory resources.
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                type: object
              rollout:
                description: Rollout configures deployment rollout behavior for this
                  server.
                properties:
                  canaryReplicas:
                    format: int32
                    type: integer
                  maxSurge:
                    type: string
                  maxUnavailable:
                    type: string
                  strategy:
                    enum:
                    - RollingUpdate
                    - Recreate
                    - Canary
                    type: string
                type: object
              secretEnvVars:
                description: SecretEnvVars are secret-backed environment variables
                  to pass to the container.
                items:
                  description: SecretEnvVar represents a secret-backed environment
                    variable.
                  properties:
                    name:
                      type: string
                    secretKeyRef:
                      description: SecretKeyRef points to a single key in a Kubernetes
                        Secret.
                      properties:
                        key:
                          type: string
                        name:
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - name
                  type: object
                type: array
              servicePort:
                description: ServicePort is the port exposed by the service (defaults
                  to 80).
                format: int32
                type: integer
              session:
                description: Session configures server-side agent session behavior.
                properties:
                  headerName:
                    type: string
                  idleTimeout:
                    type: string
                  maxLifetime:
                    type: string
                  required:
                    type: boolean
                  store:
                    type: string
                  upstreamTokenHeader:
                    type: string
                type: object
              tasks:
                description: Tasks describes task templates or workflows exposed by
                  the server.
                items:
                  description: InventoryItem describes a named MCP prompt, resource,
                    or task.
                  properties:
                    description:
                      type: string
                    labels:
                      additionalProperties:
                        type: string
                      type: object
                    name:
                      type: string
                  required:
                  - name
                  type: object
                type: array
              tools:
                description: Tools describes the MCP tool inventory exposed by the
                  server.
                items:
                  description: ToolConfig describes one MCP tool exposed by a server.
                  properties:
                    description:
                      type: string
                    labels:
                      additionalProperties:
                        type: string
                      type: object
                    name:
                      type: string
                    requiredTrust:
                      enum:
                      - low
                      - medium
                      - high
                      type: string
                  required:
                  - name
                  type: object
                type: array
              useProvisionedRegistry:
                description: UseProvisionedRegistry tells the controller to use the
                  provisioned registry (from operator env) for this server.
                type: boolean
            required:
            - image
            type: object
          status:
            description: MCPServerStatus defines the observed state of MCPServer.
            properties:
              canaryReady:
                description: CanaryReady indicates if the canary deployment, when
                  configured, is ready.
                type: boolean
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              deploymentReady:
                description: DeploymentReady indicates if the deployment is ready.
                type: boolean
              gatewayReady:
                description: GatewayReady indicates if the gateway configuration and
                  sidecar are ready.
                type: boolean
              ingressReady:
                description: IngressReady indicates if the ingress is ready.
                type: boolean
              message:
                description: Message provides additional information about the status.
                type: string
              phase:
                description: Phase represents the current phase of the MCPServer.
                type: string
              policyReady:
                description: PolicyReady indicates if policy data for the gateway
                  has been generated.
                type: boolean
              serviceReady:
                description: ServiceReady indicates if the service is ready.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
