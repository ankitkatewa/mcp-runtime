apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-pv
  labels:
    app: registry
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  storageClassName: local-path
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /var/lib/mcp-runtime/registry
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: mcp-runtime.org/local-storage
              operator: In
              values:
                - "true"
