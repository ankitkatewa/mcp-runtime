site_name: MCP Runtime Docs
site_url: https://docs.mcpruntime.org/
repo_url: https://github.com/Agent-Hellboy/mcp-runtime
repo_name: Agent-Hellboy/mcp-runtime
docs_dir: .
site_dir: /tmp/site
exclude_docs: |
  .dockerignore
  Dockerfile
  mkdocs.yml
  nginx.conf
  requirements.txt
  site/
  overrides/
theme:
  name: material
  custom_dir: overrides
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  font: false
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    scheme: default
    primary: black
    accent: blue
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js

extra_css:
  - stylesheets/infra.css
nav:
  - Home: README.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Runtime: runtime.md
  - CLI: cli.md
  - Sentinel: sentinel.md
  - API: api.md
  - Cluster Readiness: cluster-readiness.md
  - Internals:
      - Overview: internals/README.md
      - API Types: internals/api-types.md
      - CLI Internals: internals/internal-cli.md
      - Operator Internals: internals/cmd-operator.md
      - Runtime CLI Cmd: internals/cmd-mcp-runtime.md
      - Metadata Package: internals/pkg-metadata.md
      - Config and Examples: internals/config-and-examples.md
      - Tests: internals/tests.md
