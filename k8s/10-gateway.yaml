apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
spec:
  controller: traefik.io/ingress-controller
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-dynamic
  namespace: mcp-sentinel
data:
  dynamic.yml: |
    http:
      middlewares:
        pii-redactor:
          plugin:
            pii-redactor:
              maskReplacement: "[redacted]"
              hashIDs: true
              maxBodyBytes: 1048576
              bypassHeaders:
                - Authorization
                - X-Internal-Auth
                - X-Api-Key
        strip-ingest-prefix:
          stripPrefix:
            prefixes:
              - /ingest
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-plugin-pii-redactor
  namespace: mcp-sentinel
data:
  go.mod: |
    module github.com/Agent-Hellboy/mcp-runtime/traefik-plugins/pii-redactor

    go 1.22
  .traefik.yml: |
    displayName: PII Redactor
    type: middleware
    import: github.com/Agent-Hellboy/mcp-runtime/traefik-plugins/pii-redactor
    summary: Redacts PII from request and response bodies and sensitive headers.
    testData:
      maskReplacement: "[redacted]"
      hashIDs: true
      maxBodyBytes: 1048576
      bypassHeaders:
        - Authorization
        - X-Internal-Auth
        - X-Api-Key
  redactor.go: |
    package pii_redactor
    
    import (
    	"bytes"
    	"context"
    	"crypto/sha256"
    	"encoding/hex"
    	"errors"
    	"io"
    	"mime"
    	"net/http"
    	"regexp"
    	"strconv"
    	"strings"
    )
    
    // Config holds middleware configuration.
    type Config struct {
    	MaskReplacement string   `json:"maskReplacement,omitempty"`
    	BypassHeaders   []string `json:"bypassHeaders,omitempty"`
    	MaxBodyBytes    int64    `json:"maxBodyBytes,omitempty"`
    	HashIDs         bool     `json:"hashIDs,omitempty"`
    }
    
    // CreateConfig returns the default plugin configuration.
    func CreateConfig() *Config {
    	return &Config{
    		MaskReplacement: "[redacted]",
    		BypassHeaders:   []string{"Authorization", "X-Internal-Auth", "X-Api-Key"},
    		MaxBodyBytes:    1 << 20, // 1 MiB
    		HashIDs:         true,
    	}
    }
    
    // New creates a new redaction middleware.
    func New(_ context.Context, next http.Handler, cfg *Config, name string) (http.Handler, error) {
    	if next == nil {
    		return nil, errors.New("next handler is required")
    	}
    	if cfg == nil {
    		cfg = CreateConfig()
    	}
    
    	mask := cfg.MaskReplacement
    	if mask == "" {
    		mask = "[redacted]"
    	}
    
    	maxBody := cfg.MaxBodyBytes
    	if maxBody <= 0 {
    		maxBody = 1 << 20
    	}
    
    	return &Middleware{
    		next:      next,
    		name:      name,
    		mask:      mask,
    		hashIDs:   cfg.HashIDs,
    		maxBody:   maxBody,
    		bypassSet: toLowerSet(cfg.BypassHeaders),
    	}, nil
    }
    
    // Middleware implements http.Handler and performs redaction.
    type Middleware struct {
    	next      http.Handler
    	name      string
    	mask      string
    	hashIDs   bool
    	maxBody   int64
    	bypassSet map[string]struct{}
    }
    
    func (m *Middleware) ServeHTTP(rw http.ResponseWriter, req *http.Request) {
    	m.redactRequestHeaders(req.Header)
    	if m.redactRequestBody(req) {
    		http.Error(rw, http.StatusText(http.StatusRequestEntityTooLarge), http.StatusRequestEntityTooLarge)
    		return
    	}
    
    	rec := newResponseCapture(rw, m.maxBody, m.redactResponseHeaders)
    	m.next.ServeHTTP(rec, req)
    	if rec.streaming {
    		return
    	}
    
    	hdr := rec.Header()
    	m.redactResponseHeaders(hdr)
    	body := rec.bodyBytes()
    	if shouldRedactResponse(hdr.Get("Content-Type")) {
    		body = m.redactBody(body)
    	}
    
    	copyHeader(rw.Header(), hdr)
    	rw.Header().Set("Content-Length", intToString(len(body)))
    	rw.WriteHeader(rec.statusCode())
    	_, _ = rw.Write(body)
    }
    
    func (m *Middleware) redactRequestBody(req *http.Request) bool {
    	if req.Body == nil {
    		return false
    	}
    	if !shouldRedactRequest(req.Header) {
    		return false
    	}
    	limited := io.LimitReader(req.Body, m.maxBody+1)
    	raw, _ := io.ReadAll(limited)
    	_ = req.Body.Close()
    	if int64(len(raw)) > m.maxBody {
    		return true
    	}
    	redacted := m.redactBody(raw)
    	req.Body = io.NopCloser(bytes.NewReader(redacted))
    	req.ContentLength = int64(len(redacted))
    	return false
    }
    
    func (m *Middleware) redactRequestHeaders(h http.Header) {
    	m.redactHeaders(h, true)
    }
    
    func (m *Middleware) redactResponseHeaders(h http.Header) {
    	m.redactHeaders(h, false)
    }
    
    func (m *Middleware) redactHeaders(h http.Header, allowBypass bool) {
    	for key, values := range h {
    		if allowBypass && m.isBypassed(key) {
    			continue
    		}
    		for i, v := range values {
    			if isSensitiveHeader(key) {
    				h[key][i] = m.mask
    				continue
    			}
    			h[key][i] = m.redactText(v)
    		}
    	}
    }
    
    func (m *Middleware) redactBody(body []byte) []byte {
    	if len(body) == 0 {
    		return body
    	}
    	redacted := m.redactText(string(body))
    	return []byte(redacted)
    }
    
    func (m *Middleware) redactText(s string) string {
    	out := s
    	if m.hashIDs {
    		out = uuidRegex.ReplaceAllStringFunc(out, func(val string) string {
    			return "hash:" + hashPrefix(val)
    		})
    	}
    
    	out = emailRegex.ReplaceAllString(out, m.mask)
    	out = phoneRegex.ReplaceAllString(out, m.mask)
    	out = ssnRegex.ReplaceAllString(out, m.mask)
    	out = secretRegex.ReplaceAllString(out, "${1}"+m.mask)
    	out = bearerRegex.ReplaceAllString(out, "Bearer "+m.mask)
    
    	return out
    }
    
    func (m *Middleware) isBypassed(header string) bool {
    	_, ok := m.bypassSet[strings.ToLower(header)]
    	return ok
    }
    
    func isSensitiveHeader(header string) bool {
    	h := strings.ToLower(header)
    	return strings.Contains(h, "token") ||
    		strings.Contains(h, "secret") ||
    		strings.Contains(h, "api-key") ||
    		strings.Contains(h, "apikey") ||
    		strings.Contains(h, "authorization")
    }
    
    func toLowerSet(items []string) map[string]struct{} {
    	set := make(map[string]struct{}, len(items))
    	for _, it := range items {
    		if it == "" {
    			continue
    		}
    		set[strings.ToLower(it)] = struct{}{}
    	}
    	return set
    }
    
    func copyHeader(dst, src http.Header) {
    	for k, vv := range src {
    		dst[k] = append([]string(nil), vv...)
    	}
    }
    
    func intToString(v int) string {
    	return strconv.Itoa(v)
    }
    
    type responseCapture struct {
    	rw            http.ResponseWriter
    	header        http.Header
    	code          int
    	buf           bytes.Buffer
    	maxBody       int64
    	streaming     bool
    	redactHeaders func(http.Header)
    }
    
    func newResponseCapture(rw http.ResponseWriter, maxBody int64, redactHeaders func(http.Header)) *responseCapture {
    	return &responseCapture{
    		rw:            rw,
    		header:        make(http.Header),
    		maxBody:       maxBody,
    		redactHeaders: redactHeaders,
    	}
    }
    
    func (r *responseCapture) Header() http.Header {
    	return r.header
    }
    
    func (r *responseCapture) WriteHeader(statusCode int) {
    	if r.code == 0 {
    		r.code = statusCode
    	}
    }
    
    func (r *responseCapture) Write(p []byte) (int, error) {
    	if r.streaming {
    		return r.rw.Write(p)
    	}
    	if r.code == 0 {
    		r.code = http.StatusOK
    	}
    	if !shouldRedactResponse(r.header.Get("Content-Type")) || int64(r.buf.Len()+len(p)) > r.maxBody {
    		if err := r.startPassthrough(); err != nil {
    			return 0, err
    		}
    		return r.rw.Write(p)
    	}
    	return r.buf.Write(p)
    }
    
    func (r *responseCapture) Flush() {
    	if !r.streaming {
    		_ = r.startPassthrough()
    	}
    	if flusher, ok := r.rw.(http.Flusher); ok {
    		flusher.Flush()
    	}
    }
    
    func (r *responseCapture) startPassthrough() error {
    	if r.streaming {
    		return nil
    	}
    	if r.redactHeaders != nil {
    		r.redactHeaders(r.header)
    	}
    	copyHeader(r.rw.Header(), r.header)
    	r.rw.Header().Del("Content-Length")
    	r.rw.WriteHeader(r.statusCode())
    	if r.buf.Len() > 0 {
    		if _, err := r.rw.Write(r.buf.Bytes()); err != nil {
    			return err
    		}
    		r.buf.Reset()
    	}
    	r.streaming = true
    	return nil
    }
    
    func (r *responseCapture) statusCode() int {
    	if r.code == 0 {
    		return http.StatusOK
    	}
    	return r.code
    }
    
    func (r *responseCapture) bodyBytes() []byte {
    	return r.buf.Bytes()
    }
    
    func shouldRedactResponse(contentType string) bool {
    	if contentType == "" {
    		return true
    	}
    	mediaType, _, err := mime.ParseMediaType(contentType)
    	if err != nil {
    		mediaType = strings.ToLower(strings.TrimSpace(contentType))
    	} else {
    		mediaType = strings.ToLower(mediaType)
    	}
    	if strings.HasPrefix(mediaType, "text/") {
    		return true
    	}
    	return mediaType == "application/json" ||
    		strings.HasSuffix(mediaType, "+json") ||
    		mediaType == "application/xml" ||
    		strings.HasSuffix(mediaType, "+xml")
    }
    
    func shouldRedactRequest(h http.Header) bool {
    	encoding := strings.ToLower(strings.TrimSpace(h.Get("Content-Encoding")))
    	if encoding != "" && encoding != "identity" {
    		return false
    	}
    
    	contentType := h.Get("Content-Type")
    	if strings.TrimSpace(contentType) == "" {
    		return false
    	}
    
    	return shouldRedactResponse(contentType)
    }
    
    // hashPrefix returns a deterministic short hash for correlating redacted IDs.
    func hashPrefix(v string) string {
    	sum := sha256.Sum256([]byte(v))
    	return hex.EncodeToString(sum[:])[:12]
    }
    
    var (
    	emailRegex  = regexp.MustCompile(`(?i)[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}`)
    	phoneRegex  = regexp.MustCompile(`(?i)(\+?\d{1,3}[\s.-]?)?(\(\d{2,3}\)|\d{2,3})[\s.-]?\d{3}[\s.-]?\d{4}`)
    	ssnRegex    = regexp.MustCompile(`\b\d{3}-\d{2}-\d{4}\b`)
    	bearerRegex = regexp.MustCompile(`(?i)Bearer\s+[A-Za-z0-9._\-]{6,}`)
    	secretRegex = regexp.MustCompile(`(?i)((?:api[_-]?key|token|secret|password|passcode)"?\s*[:=]\s*"?)\s*([A-Za-z0-9/+._\-]{6,})`)
    	uuidRegex   = regexp.MustCompile(`(?i)\b[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\b`)
    )
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-sentinel-gateway
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-sentinel-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-sentinel-gateway
subjects:
  - kind: ServiceAccount
    name: mcp-sentinel-gateway
    namespace: mcp-sentinel
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
spec:
  selector:
    app: mcp-sentinel-gateway
  ports:
    - name: web
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-sentinel-gateway
  template:
    metadata:
      labels:
        app: mcp-sentinel-gateway
    spec:
      serviceAccountName: mcp-sentinel-gateway
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: traefik
          image: traefik:v3.0
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          args:
            - "--entrypoints.web.address=:8083"
            - "--providers.kubernetesingress=true"
            - "--providers.kubernetesingress.namespaces=mcp-sentinel"
            - "--providers.kubernetesingress.ingressclass=traefik"
            - "--providers.file.filename=/etc/traefik/dynamic/dynamic.yml"
            - "--providers.file.watch=true"
            - "--experimental.localplugins.pii-redactor.modulename=github.com/Agent-Hellboy/mcp-runtime/traefik-plugins/pii-redactor"
            - "--ping=true"
            - "--ping.entryPoint=web"
            - "--accesslog=true"
          ports:
            - containerPort: 8083
          volumeMounts:
            - name: traefik-dynamic
              mountPath: /etc/traefik/dynamic
              readOnly: true
            - name: traefik-plugin-source
              mountPath: /plugins-local/src/github.com/Agent-Hellboy/mcp-runtime/traefik-plugins/pii-redactor
              readOnly: true
            - name: traefik-plugins
              mountPath: /plugins-storage
          readinessProbe:
            httpGet:
              path: /ping
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: traefik-dynamic
          configMap:
            name: traefik-dynamic
            items:
              - key: dynamic.yml
                path: dynamic.yml
        - name: traefik-plugin-source
          configMap:
            name: traefik-plugin-pii-redactor
        - name: traefik-plugins
          emptyDir: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-sentinel-ui
                port:
                  number: 8082
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-sentinel-gateway-api
  namespace: mcp-sentinel
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: pii-redactor@file
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mcp-sentinel-api
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-sentinel-gateway-ingest
  namespace: mcp-sentinel
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: strip-ingest-prefix@file,pii-redactor@file
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: mcp-sentinel-ingest
                port:
                  number: 8081
