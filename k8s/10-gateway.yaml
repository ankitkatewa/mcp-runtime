apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
spec:
  controller: traefik.io/ingress-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-sentinel-gateway
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-sentinel-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-sentinel-gateway
subjects:
  - kind: ServiceAccount
    name: mcp-sentinel-gateway
    namespace: mcp-sentinel
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
spec:
  selector:
    app: mcp-sentinel-gateway
  ports:
    - name: web
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-sentinel-gateway
  template:
    metadata:
      labels:
        app: mcp-sentinel-gateway
    spec:
      serviceAccountName: mcp-sentinel-gateway
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: traefik
          image: traefik:v3.0
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          args:
            - "--entrypoints.web.address=:8083"
            - "--providers.kubernetesingress=true"
            - "--providers.kubernetesingress.namespaces=mcp-sentinel"
            - "--providers.kubernetesingress.ingressclass=traefik"
            - "--ping=true"
            - "--ping.entryPoint=web"
            - "--accesslog=true"
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /ping
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-sentinel-gateway
  namespace: mcp-sentinel
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mcp-sentinel-api
                port:
                  number: 8080
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: mcp-sentinel-ingest
                port:
                  number: 8081
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-sentinel-ui
                port:
                  number: 8082
