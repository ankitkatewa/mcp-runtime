apiVersion: v1
kind: PersistentVolume
metadata:
  name: kafka-pv
  labels:
    app: kafka
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  storageClassName: local-path
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: mcp-sentinel
    name: kafka-data-kafka-0
  local:
    path: /var/lib/mcp-runtime/kafka
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: mcp-runtime.org/local-storage
              operator: In
              values:
                - "true"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: zookeeper-data-pv
  labels:
    app: zookeeper
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  storageClassName: local-path
  persistentVolumeReclaimPolicy: Retain
  claimRef:
    namespace: mcp-sentinel
    name: zookeeper-data-pvc
  local:
    path: /var/lib/mcp-runtime/zookeeper/data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: mcp-runtime.org/local-storage
              operator: In
              values:
                - "true"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: zookeeper-log-pv
  labels:
    app: zookeeper
spec:
  capacity:
