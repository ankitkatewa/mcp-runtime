---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zookeeper-data-pvc
  namespace: mcp-sentinel
spec:
  storageClassName: local-path
  volumeName: zookeeper-data-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
