apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-sentinel-api
rules:
  # Read access to MCP custom resources
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpaccessgrants", "mcpagentsessions"]
    verbs: ["get", "list", "watch"]
  # Safe mutations (enable/disable/revoke/unrevoke)
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpaccessgrants"]
    verbs: ["patch"]
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpagentsessions"]
    verbs: ["patch"]
  # Restart deployments (for safe ops)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "patch"]
  # List pods for health checks and logs
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read configmaps for policy lookup
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # Read MCPServer resources
  - apiGroups: ["mcpruntime.org"]
    resources: ["mcpservers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-sentinel-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-sentinel-api
subjects:
  - kind: ServiceAccount
    name: mcp-sentinel-api
    namespace: mcp-sentinel
