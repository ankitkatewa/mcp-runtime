apiVersion: v1
kind: Service
metadata:
  name: mcp-example-server
  namespace: mcp-sentinel
spec:
  selector:
    app: mcp-example-server
  ports:
    - name: http
      port: 8090
      targetPort: 8090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-example-server
  namespace: mcp-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-example-server
  template:
    metadata:
      labels:
        app: mcp-example-server
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: mcp-example-server
          image: go-example-mcp:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
