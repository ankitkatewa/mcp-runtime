repos:
  - repo: local
    hooks:
      - id: gofmt
        name: go fmt
        entry: gofmt -w
        language: system
        types: [go]
      - id: staticcheck
        name: staticcheck
        entry: hack/staticcheck.sh
        language: system
        pass_filenames: false
        args: [./...]
      - id: govet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
      - id: generated-file-drift
        name: generated file drift
        entry: bash -c "make -f Makefile.operator generate manifests && python3 docs/scripts/generate_go_package_reference.py && git diff --exit-code"
        language: system
        pass_filenames: false
        always_run: true
