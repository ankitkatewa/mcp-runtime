repos:
  - repo: local
    hooks:
      - id: gofmt
        name: go fmt
        entry: gofmt -w
        language: system
        types: [go]
      - id: staticcheck
        name: staticcheck
        entry: hack/staticcheck.sh
        language: system
        pass_filenames: false
        args: [./...]
      - id: govet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
      - id: go-unit-tests
        name: go unit tests
        entry: bash -c 'go test -race -count=1 $(go list ./... | grep -v "^mcp-runtime/test")'
        language: system
        pass_filenames: false
        files: ^(api/|cmd/|internal/|pkg/|services/|go\.mod|go\.sum)
      - id: go-integration-tests
        name: go integration tests
        entry: bash -c 'export KUBEBUILDER_ASSETS=$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@latest use -p path) && go test -count=1 ./test/integration/...'
        language: system
        pass_filenames: false
        files: ^(api/v1alpha1/|internal/operator/|test/integration/)
      - id: generated-file-drift
        name: generated file drift
        entry: bash -c 'make -f Makefile.operator generate manifests && python3 docs/scripts/generate_go_package_reference.py && git diff --exit-code -- api/v1alpha1/zz_generated.deepcopy.go config/crd/bases docs/internals/go-package-reference.md'
        language: system
        pass_filenames: false
        always_run: true
