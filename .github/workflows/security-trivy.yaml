name: Security - Trivy

on:
  pull_request:
    branches: [ "*" ]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - 'README.md'
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'docs/**'
      - 'website/**'
      - 'README.md'
  workflow_dispatch: {}

jobs:
  trivy-fs:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    env:
      TRIVY_IMAGE: aquasec/trivy:0.65.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        run: |
          docker pull "$TRIVY_IMAGE"
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$TRIVY_IMAGE" \
            fs \
            --exit-code 1 \
            --ignore-unfixed \
            --skip-dirs inspirations/mcp-gateway-registry \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            --no-progress \
            .

  trivy-image:
    name: Trivy Operator Image Scan
    runs-on: ubuntu-latest
    env:
      TRIVY_IMAGE: aquasec/trivy:0.65.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build operator image
        run: docker build --pull -f Dockerfile.operator -t mcp-runtime-operator:ci .

      - name: Save operator image tarball
        run: docker save mcp-runtime-operator:ci -o /tmp/mcp-runtime-operator-ci.tar

      - name: Trivy image scan
        run: |
          docker pull "$TRIVY_IMAGE"
          docker run --rm \
            -v /tmp:/tmp \
            "$TRIVY_IMAGE" \
            image \
            --input /tmp/mcp-runtime-operator-ci.tar \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            --no-progress
